{% extends 'base.html' %}

{% block title %}Message Sent - Job Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body">
                <i class="fas fa-check-circle" style="font-size: 80px; color: #28a745;"></i>
                <h1 class="mt-3">Thank You!</h1>
                <p class="lead">Your message has been sent successfully.</p>
                <p>We'll get back to you within 24 hours.</p>
                <hr>
                <div class="mt-4">
                    <a href="{% url 'job_list' %}" class="btn btn-primary">
                        <i class="fas fa-briefcase"></i> Browse Jobs
                    </a>
                    <a href="{% url 'contact' %}" class="btn btn-secondary">
                        <i class="fas fa-envelope"></i> Send Another Message
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
