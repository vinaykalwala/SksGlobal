{% extends 'base.html' %}

{% block title %}Message Sent{% endblock %}

{% block extra_css %}
<style>

/* RESET */
.main-content {
    padding: 0 !important;
}
.main-content .container {
    max-width: 100% !important;
    padding: 0 !important;
}

/* WRAPPER */
.success-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;

    /* 🔥 LAYERED BACKGROUND */
    background:
        radial-gradient(circle at 20% 20%, rgba(11,61,145,0.08), transparent 20%),
        radial-gradient(circle at 80% 80%, rgba(255,156,64,0.08), transparent 20%),
        linear-gradient(to bottom, #eef3fb, #f8fafc);
}

/* SOFT GRID PATTERN */
.success-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
}

/* GLOW ORBS */
.bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
}

.glow-blue {
    width: 300px;
    height: 300px;
    background: #0b3d91;
    top: -120px;
    left: -120px;
}

.glow-orange {
    width: 260px;
    height: 260px;
    background: #ff9c40;
    bottom: -120px;
    right: -120px;
}

/* CARD */
.success-card {
    position: relative;
    z-index: 2;
    width: 420px;
    max-width: 100%;
    background: #ffffff;
    border-radius: 16px;
    padding: 60px 30px 30px;
    text-align: center;

    box-shadow:
        0 30px 70px rgba(0,0,0,0.12),
        0 10px 20px rgba(0,0,0,0.05);

    animation: fadeUp 0.5s ease;
}

/* ICON */
.success-icon {
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);

    width: 90px;
    height: 90px;
    border-radius: 50%;

    background: #22c55e;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 36px;
    box-shadow: 0 15px 35px rgba(34,197,94,0.4);
}

/* TITLE */
.success-title {
    font-size: 24px;
    font-weight: 700;
    color: #0b3d91;
}

/* DECOR LINE */
.decor-line {
    width: 50px;
    height: 3px;
    background: #ff9c40;
    margin: 15px auto;
    border-radius: 2px;
}

/* INNER BOX */
.success-box {
    background: #f8fafc;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #e5e7eb;
}

/* TEXT */
.success-text {
    font-size: 14px;
    color: #6b7280;
}

/* BUTTON */
.success-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;

    background: #ff9c40;
    color: white;
    font-weight: 600;

    cursor: pointer;
    transition: 0.3s;
}

.success-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(255,156,64,0.3);
}

/* LINK */
.secondary-link {
    display: block;
    margin-top: 12px;
    font-size: 13px;
    color: #0b3d91;
    text-decoration: none;
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 480px) {
    .success-card {
        padding: 55px 20px 25px;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="success-wrapper">

    <!-- 🔥 GLOW -->
    <div class="bg-glow glow-blue"></div>
    <div class="bg-glow glow-orange"></div>

    <div class="success-card">

        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>

        <div class="success-title">Awesome!</div>

        <div class="decor-line"></div>

        <div class="success-box">
            <div class="success-text">
                Your message has been successfully sent.<br>
                We’ll get back to you shortly.
            </div>
        </div>

        <a href="{% url 'job_list' %}">
            <button class="success-btn">Browse Jobs</button>
        </a>

        <a href="{% url 'contact' %}" class="secondary-link">
            Send another message
        </a>

    </div>

</div>

{% endblock %}
