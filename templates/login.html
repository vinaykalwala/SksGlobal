<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | SKS Global IT Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% load static %}

<!-- PROFESSIONAL FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-blue: #0b3d91;
    --blue-dark: #082e6e;
    --primary-orange: #ff9c40;
    --orange-dark: #e56a00;
}

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: url("{% static 'images/login.webp' %}") no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* ===== DARK OVERLAY ===== */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(11,61,145,0.3), rgba(8,46,110,0.85));
    backdrop-filter: blur(5px);
}

/* ===== LOGIN CARD ===== */
.login-card {
    position: relative;
    width: 420px;
    max-width: 92%;
    padding: 40px 30px;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 30px 70px rgba(0,0,0,0.35);

    color: white;
    animation: fadeIn 0.6s ease;
}

/* ===== LOGO ===== */
.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo img {
    height: 55px;
    border-radius: 10px;
    background: white;
    padding: 4px;
}

/* ===== TITLE ===== */
.login-title {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 25px;
}

/* ===== FORM ===== */
.form-group {
    margin-bottom: 18px;
}

.form-group label {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
    opacity: 0.9;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
    transition: 0.25s;
}

.form-group input::placeholder {
    color: rgba(255,255,255,0.6);
}

.form-group input:focus {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 2px rgba(255,156,64,0.4);
}

/* ===== BUTTON ===== */
.login-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;

    background: linear-gradient(135deg, var(--primary-orange), var(--orange-dark));
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;

    transition: all 0.3s ease;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(255,156,64,0.5);
}

/* ===== ERROR ===== */
.error-box {
    margin-top: 15px;
    background: rgba(255, 0, 0, 0.25);
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.75;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    .login-card {
        padding: 25px 20px;
    }

    .login-title {
        font-size: 20px;
    }
}

</style>
</head>

<body>

<div class="login-card">

    <!-- LOGO -->
    <div class="logo">
        <img src="{% static 'images/skslogo.jpg' %}" alt="SKS Logo">
    </div>

    <!-- TITLE -->
    <div class="login-title">Admin Login</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        {% if form.errors %}
            <div class="error-box">
                Invalid username or password
            </div>
        {% endif %}
    </form>

    <div class="footer">
        © 2026 SKS Global IT Services
    </div>

</div>

</body>
</html>
