{% extends 'base.html' %}

{% block title %}Delete Resource - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-file-alt" style="font-size: 64px; color: #dc3545;"></i>
                <h4 class="mt-3">Delete Resource?</h4>
                <p><strong>{{ form.instance.title }}</strong></p>
                <p class="text-danger">This action cannot be undone!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Yes, Delete
                    </button>
                    <a href="{% url ' resource_list' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
